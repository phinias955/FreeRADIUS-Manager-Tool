# PostgreSQL queries for FreeRADIUS

# This MUST be set — without it %{SQL-User-Name} expands to empty string.
sql_user_name = "%{User-Name}"

authorize_check_query = "\
    SELECT id, username, attribute, value, op \
    FROM ${authcheck_table} \
    WHERE username = '%{SQL-User-Name}' \
    ORDER BY id"

authorize_reply_query = "\
    SELECT id, username, attribute, value, op \
    FROM ${authreply_table} \
    WHERE username = '%{SQL-User-Name}' \
    ORDER BY id"

authorize_group_check_query = "\
    SELECT ${groupcheck_table}.id, ${groupcheck_table}.groupname, ${groupcheck_table}.attribute, \
           ${groupcheck_table}.value, ${groupcheck_table}.op \
    FROM ${groupcheck_table}, ${usergroup_table} \
    WHERE ${usergroup_table}.username = '%{SQL-User-Name}' \
    AND ${usergroup_table}.groupname = ${groupcheck_table}.groupname \
    ORDER BY ${usergroup_table}.priority, ${groupcheck_table}.id"

authorize_group_reply_query = "\
    SELECT ${groupreply_table}.id, ${groupreply_table}.groupname, ${groupreply_table}.attribute, \
           ${groupreply_table}.value, ${groupreply_table}.op \
    FROM ${groupreply_table}, ${usergroup_table} \
    WHERE ${usergroup_table}.username = '%{SQL-User-Name}' \
    AND ${usergroup_table}.groupname = ${groupreply_table}.groupname \
    ORDER BY ${usergroup_table}.priority, ${groupreply_table}.id"

# Accounting queries
accounting_onoff_query = "\
    UPDATE ${acct_table1} \
    SET acctstoptime = to_timestamp('%{integer:Event-Timestamp}'), \
        acctsessiontime = '%{integer:Event-Timestamp}' - EXTRACT(EPOCH FROM acctstarttime)::bigint, \
        acctterminatecause = '%{Acct-Terminate-Cause}', \
        acctupdatetime = to_timestamp('%{integer:Event-Timestamp}') \
    WHERE nasipaddress = '%{NAS-IP-Address}' \
    AND acctstoptime IS NULL"

accounting_update_query = "\
    UPDATE ${acct_table1} \
    SET frameipaddress = NULLIF('%{Framed-IP-Address}', '')::inet, \
        acctsessiontime = '%{integer:Acct-Session-Time}', \
        acctupdatetime = to_timestamp('%{integer:Event-Timestamp}'), \
        acctinterval = '%{integer:Acct-Interim-Interval}', \
        acctinputoctets = (('%{integer:Acct-Input-Gigawords}'::bigint << 32) + '%{integer:Acct-Input-Octets}'::bigint), \
        acctoutputoctets = (('%{integer:Acct-Output-Gigawords}'::bigint << 32) + '%{integer:Acct-Output-Octets}'::bigint) \
    WHERE acctuniqueid = '%{Acct-Unique-Session-Id}' \
    AND acctstoptime IS NULL"

accounting_start_query = "\
    INSERT INTO ${acct_table1} \
           (acctsessionid, acctuniqueid, username, realm, nasipaddress, nasportid, \
            nasporttype, acctstarttime, acctupdatetime, acctauthentic, \
            connectinfo_start, acctinputoctets, acctoutputoctets, calledstationid, \
            callingstationid, servicetype, framedprotocol, framedipaddress, \
            framedipv6address, framedipv6prefix, framedinterfaceid, delegatedipv6prefix) \
    VALUES('%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', '%{SQL-User-Name}', \
           '%{Realm}', '%{NAS-IP-Address}', '%{NAS-Port-Id}', '%{NAS-Port-Type}', \
           to_timestamp('%{integer:Event-Timestamp}'), to_timestamp('%{integer:Event-Timestamp}'), \
           '%{Acct-Authentic}', '%{Connect-Info}', 0, 0, '%{Called-Station-Id}', \
           '%{Calling-Station-Id}', '%{Service-Type}', '%{Framed-Protocol}', \
           NULLIF('%{Framed-IP-Address}', '')::inet, \
           NULLIF('%{Framed-IPv6-Address}', '')::inet, \
           NULLIF('%{Framed-IPv6-Prefix}', '')::inet, \
           NULLIF('%{Framed-Interface-Id}', ''), \
           NULLIF('%{Delegated-IPv6-Prefix}', '')::inet)"

accounting_stop_query = "\
    UPDATE ${acct_table2} \
    SET acctstoptime = to_timestamp('%{integer:Event-Timestamp}'), \
        acctsessiontime = '%{integer:Acct-Session-Time}', \
        acctinputoctets = (('%{integer:Acct-Input-Gigawords}'::bigint << 32) + '%{integer:Acct-Input-Octets}'::bigint), \
        acctoutputoctets = (('%{integer:Acct-Output-Gigawords}'::bigint << 32) + '%{integer:Acct-Output-Octets}'::bigint), \
        acctterminatecause = '%{Acct-Terminate-Cause}', \
        connectinfo_stop = '%{Connect-Info}', \
        acctupdatetime = to_timestamp('%{integer:Event-Timestamp}') \
    WHERE acctuniqueid = '%{Acct-Unique-Session-Id}' \
    AND acctstoptime IS NULL"

# Simultaneous-Use check
simul_count_query = "\
    SELECT COUNT(*) FROM ${acct_table1} \
    WHERE username = '%{SQL-User-Name}' \
    AND acctstoptime IS NULL"

# Read NAS clients from database
client_query = "\
    SELECT nasname, shortname, type, secret, server \
    FROM nas \
    WHERE status = 'active'"

# Post-Auth logging (FreeRADIUS 3.2 uses post-auth { query = ... } block)
post-auth {
    query = "\
        INSERT INTO ${..postauth_table} (username, pass, reply, calledstationid, callingstationid, authdate, nasipaddress) \
        VALUES ('%{SQL-User-Name}', '', '%{reply:Packet-Type}', \
                '%{Called-Station-Id}', '%{Calling-Station-Id}', \
                NOW(), \
                NULLIF('%{NAS-IP-Address}', '')::inet)"
}
