# FreeRADIUS clients.conf
# RADIUS_SECRET_PLACEHOLDER is replaced by init.sh at container startup.

client localhost {
    ipaddr    = 127.0.0.1
    secret    = RADIUS_SECRET_PLACEHOLDER
    shortname = localhost
    nastype   = other
    require_message_authenticator = no
}

client docker_17 {
    ipaddr    = 172.17.0.0/16
    secret    = RADIUS_SECRET_PLACEHOLDER
    shortname = docker-17
    nastype   = other
    require_message_authenticator = no
}

