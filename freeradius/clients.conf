# FreeRADIUS clients.conf
# Static clients are defined here. Dynamic clients are loaded from the database (nas table).

client localhost {
    ipaddr          = 127.0.0.1
    secret          = testing123
    shortname       = localhost
    nastype         = other
    require_message_authenticator = no
}

# Allow the backend container to send test RADIUS packets
client radius_network {
    ipaddr          = 172.0.0.0/8
    secret          = testing123
    shortname       = docker-network
    nastype         = other
    require_message_authenticator = no
}

